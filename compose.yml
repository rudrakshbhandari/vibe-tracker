services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: vibe_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - vibe_tracker_postgres:/var/lib/postgresql/data

volumes:
  vibe_tracker_postgres:
