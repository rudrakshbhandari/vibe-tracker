name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Hosted env contract
        env:
          VERCEL: "1"
          VERCEL_ENV: production
          APP_URL: https://vibe-tracker.example.com
          POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/vibe_tracker_ci
          POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/vibe_tracker_ci
          GITHUB_APP_ID: 12345
          GITHUB_APP_CLIENT_ID: github-client-id
          GITHUB_APP_CLIENT_SECRET: github-client-secret
          GITHUB_APP_PRIVATE_KEY: launch-private-key
          GITHUB_APP_SLUG: vibe-tracker
          SESSION_ENCRYPTION_KEY: launch-session-key
        run: node scripts/validate-hosted-env.mjs

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vibe_tracker_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/vibe_tracker_ci
        run: npm run build
