name: Hosted Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

concurrency:
  group: hosted-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosted-sync-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel production deployment
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ github.sha }}
        with:
          script: |
            const sha = process.env.TARGET_SHA;
            for (let attempt = 0; attempt < 40; attempt += 1) {
              const { data } = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });
              const vercelStatus = data.statuses.find((status) => status.context === "Vercel");
              if (vercelStatus?.state === "success") {
                core.info(`Vercel deployment is ready: ${vercelStatus.target_url}`);
                return;
              }
              if (vercelStatus?.state === "failure" || vercelStatus?.state === "error") {
                core.setFailed(`Vercel deployment failed: ${vercelStatus.target_url}`);
                return;
              }
              core.info(`Waiting for Vercel deployment for ${sha} (attempt ${attempt + 1}/40)`);
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }
            core.setFailed(`Timed out waiting for Vercel deployment for ${sha}`);

      - name: Run hosted GitHub sync smoke test
        env:
          HOSTED_SMOKE_URL: https://vibe-tracker-max.vercel.app
          SMOKE_TEST_SECRET: ${{ secrets.VIBE_TRACKER_SMOKE_TEST_SECRET }}
        run: node scripts/hosted-sync-smoke.mjs
